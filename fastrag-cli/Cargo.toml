[package]
name = "fastrag-cli"
description = "CLI for FastRAG document parser"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "fastrag"
path = "src/main.rs"

[dependencies]
fastrag.workspace = true
fastrag-mcp = { workspace = true, optional = true }
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
indicatif = "0.17"
serde_json = "1"

[features]
default = ["language-detection", "mcp"]
language-detection = ["fastrag/language-detection"]
mcp = ["dep:fastrag-mcp"]

[dev-dependencies]
serde_json = "1"
